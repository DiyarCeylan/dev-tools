<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaren - Psikolojik Yapay Zeka Asistanı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-gradient: linear-gradient(180deg, #F5F0FF 0%, #FAFAF5 50%, #F0F0F5 100%);
            --text-color: #374151;
            --header-bg: rgba(255, 255, 255, 0.9);
            --header-border: rgba(139, 92, 246, 0.1);
            --msg-assistant-bg: white;
            --msg-assistant-color: #374151;
            --msg-assistant-border: rgba(139, 92, 246, 0.08);
            --msg-user-bg: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
            --msg-user-color: white;
            --msg-alert-bg: #FEF2F2;
            --msg-alert-border: #FCA5A5;
            --msg-alert-color: #991B1B;
            --input-container-bg: rgba(255, 255, 255, 0.95);
            --input-bg: white;
            --input-border: #E5E7EB;
            --input-placeholder: #9CA3AF;
            --typing-bg: white;
            --typing-border: rgba(139, 92, 246, 0.08);
            --typing-text: #8B5CF6;
            --typing-dot: #8B5CF6;
            --scrollbar-thumb: #C4B5FD;
            --shadow: rgba(0, 0, 0, 0.06);
            --header-shadow: rgba(0, 0, 0, 0.02);
            --input-shadow: rgba(0, 0, 0, 0.03);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f1419 100%);
            --text-color: #e0e0e0;
            --header-bg: rgba(26, 26, 46, 0.95);
            --header-border: rgba(139, 92, 246, 0.3);
            --msg-assistant-bg: #2d2d44;
            --msg-assistant-color: #e0e0e0;
            --msg-assistant-border: rgba(139, 92, 246, 0.2);
            --msg-user-bg: linear-gradient(135deg, #6D28D9 0%, #5B21B6 100%);
            --msg-user-color: #e0e0e0;
            --msg-alert-bg: #3d1a1a;
            --msg-alert-border: #991B1B;
            --msg-alert-color: #fca5a5;
            --input-container-bg: rgba(26, 26, 46, 0.95);
            --input-bg: #2d2d44;
            --input-border: #4a4a6a;
            --input-placeholder: #9CA3AF;
            --typing-bg: #2d2d44;
            --typing-border: rgba(139, 92, 246, 0.2);
            --typing-text: #a78bfa;
            --typing-dot: #a78bfa;
            --scrollbar-thumb: #4a4a6a;
            --shadow: rgba(0, 0, 0, 0.3);
            --header-shadow: rgba(0, 0, 0, 0.3);
            --input-shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--header-border);
            box-shadow: 0 2px 10px var(--header-shadow);
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #C4B5FD 0%, #A78BFA 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
        }
        .avatar svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        .header-text h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #6D28D9;
            margin: 0;
            letter-spacing: -0.02em;
        }
        .header-text p {
            font-size: 0.8rem;
            color: #8B5CF6;
            margin: 2px 0 0 0;
            font-weight: 400;
        }
        .header-subtitle {
            font-size: 0.7rem !important;
            color: #A78BFA !important;
            opacity: 0.8;
            margin-top: 1px !important;
        }
        .theme-toggle {
            margin-left: auto;
            background: transparent;
            border: 2px solid var(--header-border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: #6D28D9;
        }
        .theme-toggle:hover {
            background: rgba(139, 92, 246, 0.1);
            transform: scale(1.05);
        }
        .theme-icon {
            width: 20px;
            height: 20px;
        }
        [data-theme="dark"] .theme-toggle {
            color: #a78bfa;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }
        .message {
            max-width: 75%;
            padding: 14px 18px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--msg-assistant-bg);
            border-radius: 24px 24px 24px 8px;
            box-shadow: 0 2px 12px var(--shadow);
            color: var(--msg-assistant-color);
            border: 1px solid var(--msg-assistant-border);
        }
        .message.user {
            align-self: flex-end;
            background: var(--msg-user-bg);
            color: var(--msg-user-color);
            border-radius: 24px 24px 8px 24px;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.25);
        }
        .message.alert {
            align-self: flex-start;
            background: var(--msg-alert-bg);
            border: 1px solid var(--msg-alert-border);
            color: var(--msg-alert-color);
            border-radius: 24px 24px 24px 8px;
            box-shadow: 0 2px 12px rgba(239, 68, 68, 0.1);
        }
        .typing-indicator {
            align-self: flex-start;
            background: var(--typing-bg);
            padding: 16px 24px;
            border-radius: 24px 24px 24px 8px;
            box-shadow: 0 2px 12px var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--typing-border);
        }
        .typing-text {
            color: var(--typing-text);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--typing-dot);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes blink {
            0%, 80%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            40% {
                opacity: 1;
                transform: scale(1);
            }
        }
        .input-container {
            background: var(--input-container-bg);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-top: 1px solid var(--header-border);
            box-shadow: 0 -4px 20px var(--input-shadow);
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-wrapper input {
            flex: 1;
            border: 2px solid var(--input-border);
            border-radius: 24px;
            padding: 14px 24px;
            font-size: 1rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            background: var(--input-bg);
            transition: all 0.2s ease;
            color: var(--text-color);
        }
        .input-wrapper input:focus {
            border-color: #A78BFA;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }
        .input-wrapper input::placeholder {
            color: var(--input-placeholder);
        }
        .input-wrapper button {
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        .input-wrapper button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
        }
        .input-wrapper button:active {
            transform: scale(0.98);
        }
        .input-wrapper button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        @media (max-width: 768px) {
            .message {
                max-width: 85%;
            }
            .header {
                padding: 12px 16px;
            }
            .chat-container {
                padding: 16px 12px;
            }
            .input-container {
                padding: 12px 16px;
            }
        }
        .summary-box {
            align-self: center;
            background: linear-gradient(135deg, #ede9fe 0%, #f3e8ff 100%);
            border: 2px solid #c4b5fd;
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
            max-width: 90%;
            width: 100%;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.15);
        }
        [data-theme="dark"] .summary-box {
            background: linear-gradient(135deg, #2d1b69 0%, #1e1b4b 100%);
            border-color: #6d28d9;
        }
        .summary-header {
            font-size: 1rem;
            font-weight: 600;
            color: #6D28D9;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        [data-theme="dark"] .summary-header {
            color: #a78bfa;
        }
        .summary-content {
            color: #374151;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        [data-theme="dark"] .summary-content {
            color: #e0e0e0;
        }
        .summary-copy-btn {
            margin-top: 12px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }
        .summary-copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        .summary-copy-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="avatar">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </div>
        <div class="header-text">
            <h1>Yaren</h1>
            <p>Seninle buradayım</p>
            <p class="header-subtitle">Yapay Zeka Asistanı</p>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Tema değiştir">
            <svg id="sun-icon" class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg id="moon-icon" class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </header>

    <main class="chat-container" id="messages"></main>

    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Dinlemek için buradayım...">
            <button id="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // DOM Elements
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // --- Constants ---
        const API_BASE_URL = 'http://localhost:3001'; // Backend URL

        const crisisPatterns = [
            /\bintihar\b/,
            /\bölmek istiyorum\b/,
            /\byaşamamak\b/,
            /\bkendime zarar\b/,
            /\bkendimi öldür\b/,
            /\bkendini öldürmek\b/,
            /\bölmeyi düşünüyorum\b/,
            /\bson vermek\b/,
            /\böldürmek istiyorum\b/,
            /\bölsem\b/,
            /\bölürsem\b/,
            /\bölmek\b/,
            /\bölüm\b/
        ];

        // --- Utility Functions ---
        function normalizeText(text) {
            return text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }

        function detectCrisis(text) {
            const normalized = normalizeText(text);
            return crisisPatterns.some(pattern => pattern.test(normalized));
        }

        function appendMessage(text, role = 'assistant') {
            // Check for summary tags
            const summaryRegex = /\[ÖZET_BAŞLANGICI\]([\s\S]*?)\[ÖZET_SONU\]/;
            const match = text.match(summaryRegex);

            if (match && role === 'assistant') {
                // Extract main message (text before summary)
                const mainMessage = text.replace(summaryRegex, '').trim();
                const summaryContent = match[1].trim();

                // Display main message
                if (mainMessage) {
                    const msg = document.createElement('div');
                    msg.className = `message ${role}`;
                    msg.textContent = mainMessage;
                    messagesEl.appendChild(msg);
                }

                // Display summary in a separate box
                const summaryBox = document.createElement('div');
                summaryBox.className = 'summary-box';
                summaryBox.innerHTML = `
                    <div class="summary-header">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Konuşma Özeti
                    </div>
                    <div class="summary-content">${summaryContent}</div>
                    <button class="summary-copy-btn" onclick="copySummary(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Kopyala
                    </button>
                `;
                messagesEl.appendChild(summaryBox);
            } else {
                // Normal message without summary
                const msg = document.createElement('div');
                msg.className = `message ${role}`;
                msg.textContent = text;
                messagesEl.appendChild(msg);
            }

            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function copySummary(btn) {
            const summaryContent = btn.parentElement.querySelector('.summary-content').textContent;
            navigator.clipboard.writeText(summaryContent).then(() => {
                const originalText = btn.innerHTML;
                btn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    Kopyalandı!
                `;
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            });
        }

        function showTypingIndicator() {
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.id = 'typing-indicator';
            typing.innerHTML = `
                <span class="typing-text">Yaren yazıyor</span>
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesEl.appendChild(typing);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) {
                typing.remove();
            }
        }

        // --- Chat Functions ---
        let conversationHistory = [];

        async function callOpenAI(messages) {
            try {
                console.log('OpenAI çağrılıyor...', messages);
                
                const response = await fetch(`${API_BASE_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: messages
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    const err = new Error(data.message || data.error?.message || `Hata: ${response.status}`);
                    err.status = response.status;
                    throw err;
                }

                console.log('Yanıt alındı:', data.choices[0].message.content);
                return data.choices[0].message.content;

            } catch (error) {
                console.error('❌ API Hatası:', error);
                throw error;
            }
        }

        async function handleUserMessage() {
            const userText = inputEl.value.trim();
            if (!userText) return;

            appendMessage(userText, 'user');
            inputEl.value = '';

            conversationHistory.push({ role: 'user', content: userText });

            const hasCrisis = detectCrisis(userText);
            let aiResponse = '';

            if (hasCrisis) {
                aiResponse = `Seni duyuyorum, bu gerçekten çok zor bir his. Acil destek için lütfen 182 ALO Psikiyatri Hattı'nı ara. Burada sana sakinlik ve güven vermeye çalışırım, ama bu durumda profesyonel yardım almak çok önemli.`;
                appendMessage(aiResponse, 'alert');
                conversationHistory.push({ role: 'assistant', content: aiResponse });
            } else {
                showTypingIndicator();
                sendBtn.disabled = true;
                inputEl.disabled = true;

                try {
                    aiResponse = await callOpenAI(conversationHistory);
                    removeTypingIndicator();
                    appendMessage(aiResponse, 'assistant');
                    conversationHistory.push({ role: 'assistant', content: aiResponse });
                } catch (error) {
                    removeTypingIndicator();
                    if (error.status === 429) {
                        appendMessage(error.message, 'assistant');
                    } else {
                        appendMessage(`Üzgünüm, bir hata oluştu. ${error.message}. Lütfen tekrar deneyin.`, 'assistant');
                    }
                } finally {
                    sendBtn.disabled = false;
                    inputEl.disabled = false;
                    inputEl.focus();
                }
            }
        }

        // --- Event Listeners ---
        sendBtn.addEventListener('click', handleUserMessage);
        inputEl.addEventListener('keydown', event => {
            if (event.key === 'Enter') {
                handleUserMessage();
            }
        });

        // --- Theme Toggle ---
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'dark') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
            localStorage.setItem('theme', theme);
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        });

        // Load saved theme or default to light
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        // --- Initial Setup ---
        const welcomeMessage = 'Merhaba ben Yaren. Seni dinlemek için burada olan bir yapay zeka asistanıyım. Bugün nasıl hissediyorsun?';
        appendMessage(welcomeMessage, 'assistant');
        conversationHistory.push({ role: 'assistant', content: welcomeMessage });
        inputEl.focus();

    </script>
</body>
</html>
