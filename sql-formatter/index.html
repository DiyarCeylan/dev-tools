  <script>
    function showToast(msg) {
      var t = document.createElement('div');
      t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--radius-sm);font-size:0.85rem;font-weight:500;z-index:999;animation:fadeSlideUp 0.3s ease-out;max-width:90vw';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function() { t.remove(); }, 2500);
    }

    function copyToClipboard(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); showToast('Copied!'); } catch(e) { showToast('Failed to copy'); }
      document.body.removeChild(ta);
    }

    var KEYWORDS = ['SELECT','FROM','WHERE','AND','OR','NOT','IN','IS','NULL','AS','ON','LEFT','RIGHT','INNER','OUTER','JOIN','FULL','CROSS','GROUP','BY','ORDER','ASC','DESC','HAVING','LIMIT','OFFSET','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','DROP','ALTER','ADD','COLUMN','INDEX','VIEW','COUNT','SUM','AVG','MIN','MAX','DISTINCT','CASE','WHEN','THEN','ELSE','END','EXISTS','BETWEEN','LIKE','UNION','ALL','PRIMARY','KEY','FOREIGN','REFERENCES','CASCADE','DEFAULT','CHECK','UNIQUE','IF','REPLACE','MERGE','WITH','RECURSIVE','EXCEPT','INTERSECT','TRUE','FALSE'];
    var FUNCTIONS = ['COUNT','SUM','AVG','MIN','MAX','COALESCE','IFNULL','NULLIF','CAST','CONVERT','SUBSTR','SUBSTRING','LENGTH','TRIM','UPPER','LOWER','REPLACE','CONCAT','GROUP_CONCAT','DATE','DATETIME','STRFTIME','NOW','CURDATE','CURTIME','ROUND','FLOOR','CEIL','ABS','RANDOM','TYPEOF','INSTR'];

    function isKeyword(w) { return KEYWORDS.indexOf(w.toUpperCase()) > -1; }
    function isFunction(w) { return FUNCTIONS.indexOf(w.toUpperCase()) > -1; }

    function highlightSQL(sql) {
      var kwSet = {}; KEYWORDS.forEach(function(k) { kwSet[k] = true; });
      var fnSet = {}; FUNCTIONS.forEach(function(f) { fnSet[f] = true; });
      var escaped = sql.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var tokens = [];
      var i = 0;
      while (i < escaped.length) {
        if (escaped[i] === "'" || escaped[i] === '"') {
          var quote = escaped[i];
          var start = i;
          i++;
          while (i < escaped.length && escaped[i] !== quote) { if (escaped[i] === '\\') i++; i++; }
          if (i < escaped.length) i++;
          tokens.push({ type: 'str', text: escaped.substring(start, i) });
        } else if (escaped[i] === '-' && escaped[i+1] === '-') {
          var start = i;
          while (i < escaped.length && escaped[i] !== '\n') i++;
          tokens.push({ type: 'cm', text: escaped.substring(start, i) });
        } else if (/[a-zA-Z_]/.test(escaped[i])) {
          var start = i;
          while (i < escaped.length && /[a-zA-Z0-9_]/.test(escaped[i])) i++;
          var word = escaped.substring(start, i);
          if (kwSet[word.toUpperCase()]) tokens.push({ type: 'kw', text: word });
          else if (fnSet[word.toUpperCase()] && escaped[i] === '(') tokens.push({ type: 'fn', text: word });
          else tokens.push({ type: 'text', text: word });
        } else if (/[0-9]/.test(escaped[i])) {
          var start = i;
          while (i < escaped.length && /[0-9.]/.test(escaped[i])) i++;
          tokens.push({ type: 'num', text: escaped.substring(start, i) });
        } else {
          tokens.push({ type: 'text', text: escaped[i] });
          i++;
        }
      }
      return tokens.map(function(t) {
        if (t.type === 'text') return t.text;
        return '<span class="' + t.type + '">' + t.text + '</span>';
      }).join('');
    }

    function formatSQL(sql) {
      var uppercase = document.getElementById('uppercase').checked;
      var indentSize = parseInt(document.getElementById('indent-size').value);

      var KEYWORDS = { SELECT:1, INSERT:1, UPDATE:1, DELETE:1, CREATE:1, ALTER:1, DROP:1, TABLE:1, INDEX:1, VIEW:1, FROM:1, WHERE:1, 'AND':1, 'OR':1, 'GROUP':1, 'ORDER':1, 'BY':1, HAVING:1, LIMIT:1, OFFSET:1, SET:1, VALUES:1, INTO:1, JOIN:1, 'LEFT':1, 'RIGHT':1, 'INNER':1, 'OUTER':1, 'FULL':1, 'CROSS':1, 'NATURAL':1, 'ON':1, 'AS':1, 'NOT':1, 'NULL':1, 'IN':1, 'IS':1, 'LIKE':1, 'BETWEEN':1, 'EXISTS':1, 'ALL':1, 'ANY':1, 'UNION':1, 'EXCEPT':1, 'INTERSECT':1, 'ASC':1, 'DESC':1, 'DISTINCT':1, 'CASE':1, 'WHEN':1, 'THEN':1, 'ELSE':1, 'END':1, 'WITH':1, 'RECURSIVE':1, 'PRIMARY':1, 'KEY':1, 'FOREIGN':1, 'REFERENCES':1, 'CASCADE':1, 'DEFAULT':1, 'CHECK':1, 'UNIQUE':1, 'IF':1, 'REPLACE':1, 'MERGE':1, 'TRUE':1, 'FALSE':1, 'TOP':1, 'USING':1, 'RETURNING':1 };
      var JOIN_WORDS = { 'JOIN':1, 'LEFT':1, 'RIGHT':1, 'INNER':1, 'OUTER':1, 'FULL':1, 'CROSS':1, 'NATURAL':1 };

      var tokens = [];
      for (var i = 0; i < sql.length;) {
        if (sql[i] === ' ' || sql[i] === '\t' || sql[i] === '\r' || sql[i] === '\n') { i++; continue; }
        if (sql[i] === "'" || sql[i] === '"') {
          var q = sql[i], s = i; i++;
          while (i < sql.length && sql[i] !== q) { if (sql[i] === '\\') i++; i++; }
          if (i < sql.length) i++;
          tokens.push({ t: sql.substring(s, i), k: 0 }); continue;
        }
        if (sql[i] === '-' && sql[i+1] === '-') { var s = i; while (i < sql.length && sql[i] !== '\n') i++; tokens.push({ t: sql.substring(s, i), k: 2 }); continue; }
        if (/[a-zA-Z_]/.test(sql[i])) { var s = i; while (i < sql.length && /[a-zA-Z0-9_]/.test(sql[i])) i++; var w = sql.substring(s, i); tokens.push({ t: w, k: KEYWORDS[w.toUpperCase()] ? 1 : 0 }); continue; }
        if (/[0-9]/.test(sql[i])) { var s = i; while (i < sql.length && /[0-9.]/.test(sql[i])) i++; tokens.push({ t: sql.substring(s, i), k: 0 }); continue; }
        tokens.push({ t: sql[i], k: 0 }); i++;
      }

      function uc(t) { return KEYWORDS[t.toUpperCase()] && uppercase ? t.toUpperCase() : t; }
      function needSpace(prev, curr) {
        if (!prev) return false;
        if (curr === ',' || curr === ')' || curr === '.') return false;
        if (prev === '(' || prev === '.') return false;
        if (curr === '(' && FUNCTIONS.indexOf(prev.toUpperCase()) > -1) return false;
        return true;
      }

      var out = [];
      var indent = 0, parenDepth = 0, inLine = [];
      function emitLine(nl) {
        if (inLine.length > 0) {
          var text = '';
          for (var i = 0; i < inLine.length; i++) {
            if (needSpace(i > 0 ? inLine[i-1] : null, inLine[i])) text += ' ';
            text += inLine[i];
          }
          var lvl = parenDepth > 0 ? indent + parenDepth : indent;
          out.push({ indent: Math.max(0, lvl), text: text });
          inLine = [];
        }
        if (nl !== undefined) indent = nl;
      }

      for (var pos = 0; pos < tokens.length; pos++) {
        var tok = tokens[pos];
        if (tok.k === 2) { emitLine(); inLine.push(tok.t); emitLine(); continue; }
        if (tok.t === '(') { parenDepth++; inLine.push('('); continue; }
        if (tok.t === ')') { parenDepth = Math.max(0, parenDepth - 1); inLine.push(')'); continue; }
        if (tok.t === ',') { inLine.push(','); if (parenDepth === 0) { emitLine(); indent = Math.max(1, indent); } continue; }

        if (tok.k === 1) {
          var up = tok.t.toUpperCase();
          var nxt = pos + 1 < tokens.length ? tokens[pos+1].t.toUpperCase() : '';
          if (up === 'SELECT' && parenDepth === 0) { emitLine(0); inLine.push('SELECT'); continue; }
          if (up === 'INSERT' && parenDepth === 0) { emitLine(0); inLine.push('INSERT'); continue; }
          if (up === 'UPDATE' && parenDepth === 0) { emitLine(0); inLine.push('UPDATE'); continue; }
          if (up === 'DELETE' && parenDepth === 0) { emitLine(0); inLine.push('DELETE'); continue; }
          if (up === 'CREATE' && parenDepth === 0) { emitLine(0); inLine.push('CREATE'); continue; }
          if (up === 'ALTER' && parenDepth === 0) { emitLine(0); inLine.push('ALTER'); continue; }
          if (up === 'DROP' && parenDepth === 0) { emitLine(0); inLine.push('DROP'); continue; }
          if (up === 'FROM' && parenDepth === 0) { emitLine(0); inLine.push('FROM'); continue; }
          if (up === 'WHERE' && parenDepth === 0) { emitLine(0); inLine.push('WHERE'); continue; }
          if (up === 'HAVING' && parenDepth === 0) { emitLine(0); inLine.push('HAVING'); continue; }
          if (up === 'LIMIT' && parenDepth === 0) { emitLine(0); inLine.push('LIMIT'); continue; }
          if (up === 'OFFSET' && parenDepth === 0) { emitLine(0); inLine.push('OFFSET'); continue; }
          if (up === 'SET' && parenDepth === 0) { emitLine(0); inLine.push('SET'); continue; }
          if (up === 'VALUES' && parenDepth === 0) { emitLine(1); inLine.push('VALUES'); continue; }
          if (up === 'ORDER' && nxt === 'BY' && parenDepth === 0) { emitLine(0); inLine.push('ORDER'); pos++; inLine.push('BY'); continue; }
          if (up === 'GROUP' && nxt === 'BY' && parenDepth === 0) { emitLine(0); inLine.push('GROUP'); pos++; inLine.push('BY'); continue; }
          if ((up === 'AND' || up === 'OR') && parenDepth === 0) { emitLine(1); inLine.push(up); continue; }
          if (up === 'ON' && parenDepth === 0) {
            if (inLine.length > 0) { inLine.push('ON'); continue; }
            emitLine(0); inLine.push('ON'); continue;
          }
          if (JOIN_WORDS[up] && parenDepth === 0) {
            if (up === 'JOIN') { emitLine(0); inLine.push('JOIN'); continue; }
            var nn = pos + 1 < tokens.length ? tokens[pos+1].t.toUpperCase() : '';
            if (nn === 'JOIN') { emitLine(0); inLine.push(up); pos++; inLine.push('JOIN'); continue; }
          }
          inLine.push(uc(tok.t));
          continue;
        }

        if (tok.t === '*' || tok.t === '=' || tok.t === '>' || tok.t === '<' || tok.t === '!' || tok.t === '+' || tok.t === '-' || tok.t === '/' || tok.t === '%') {
          inLine.push(tok.t);
          continue;
        }

        inLine.push(tok.t);
      }

      emitLine(0);

      var result = '';
      for (var r = 0; r < out.length; r++) {
        var sp = '';
        for (var s = 0; s < out[r].indent * indentSize; s++) sp += ' ';
        if (r > 0) result += '\n';
        result += sp + out[r].text;
      }
      return result;
    }

    function formatAndDisplay() {
      var input = document.getElementById('sql-input').value;
      document.getElementById('input-count').textContent = input.length + ' chars';
      if (!input.trim()) { document.getElementById('sql-output').innerHTML = '<span class="cm">-- Enter SQL above and click Format</span>'; document.getElementById('line-numbers').textContent = '1'; document.getElementById('output-count').textContent = '0 chars'; return; }
      var formatted = formatSQL(input);
      var highlighted = highlightSQL(formatted);
      document.getElementById('sql-output').innerHTML = highlighted || '<span class="cm">-- No output</span>';
      var lines = (formatted || '').split('\n').length;
      var nums = '';
      for (var i = 1; i <= lines; i++) { nums += i + '\n'; }
      document.getElementById('line-numbers').textContent = nums;
      document.getElementById('output-count').textContent = formatted.length + ' chars';
    }

    document.getElementById('format-btn').addEventListener('click', formatAndDisplay);

    document.getElementById('copy-btn').addEventListener('click', function() {
      var text = document.getElementById('sql-output').textContent;
      if (!text || text === '-- Click Format to beautify' || text === '-- Enter SQL above and click Format' || text === '-- No output') { showToast('Nothing to copy'); return; }
      copyToClipboard(text);
    });

    document.getElementById('sql-input').addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); formatAndDisplay(); }
    });
    document.getElementById('sql-input').addEventListener('input', function() {
      document.getElementById('input-count').textContent = this.value.length + ' chars';
    });
    document.getElementById('uppercase').addEventListener('change', formatAndDisplay);
    document.getElementById('indent-size').addEventListener('change', formatAndDisplay);

    (function(){
      var t=document.getElementById('theme-toggle'),i=document.getElementById('theme-icon');
      function g(){return document.documentElement.getAttribute('data-theme')||'light'}
      function s(t){document.documentElement.setAttribute('data-theme',t);i.innerHTML=t==='dark'?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>':'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';try{localStorage.setItem('theme',t)}catch(e){}}
      try{var l=localStorage.getItem('theme');if(l)s(l);else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)s('dark')}catch(e){}
      t.addEventListener('click',function(){s(g()==='dark'?'light':'dark')});
    })();
  </script>
