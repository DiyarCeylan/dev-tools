  <style>
    :root {
      --brand-hue: 265; --brand: oklch(0.55 0.24 var(--brand-hue)); --brand-light: oklch(0.92 0.06 var(--brand-hue));
      --brand-gradient: linear-gradient(135deg, oklch(0.55 0.24 265), oklch(0.5 0.26 300));
      --bg: oklch(0.985 0.002 280); --bg-secondary: oklch(0.96 0.004 280); --bg-card: oklch(0.99 0.002 280 / 0.6);
      --text: oklch(0.15 0.02 280); --text-secondary: oklch(0.4 0.02 280); --text-muted: oklch(0.65 0.01 280);

    [data-theme="dark"] {

      --text: oklch(0.95 0.01 280); --text-secondary: oklch(0.7 0.02 280); --text-muted: oklch(0.5 0.02 280);
      --border: oklch(0.25 0.02 280 / 0.5); --border-hover: oklch(0.35 0.04 280);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
    body::before { content: ''; position: fixed; inset: 0; z-index: -1; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-repeat: repeat; background-size: 256px 256px; pointer-events: none; }
    body::after { content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none; background: radial-gradient(ellipse 600px 400px at 10% 20%, oklch(0.55 0.24 265 / 0.04) 0%, transparent 100%), radial-gradient(ellipse 500px 500px at 90% 80%, oklch(0.5 0.26 300 / 0.03) 0%, transparent 100%); }
    header { position: sticky; top: 0; z-index: 100; background: color-mix(in oklch, var(--bg) 80%, transparent); border-bottom: 1px solid var(--border); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }

    .kw { color: oklch(0.5 0.2 265); font-weight: 600; }
    .fn { color: oklch(0.5 0.18 200); }
    .str { color: oklch(0.5 0.18 140); }

    .cm { color: var(--text-muted); font-style: italic; }
    [data-theme="dark"] .kw { color: oklch(0.7 0.18 265); }
    [data-theme="dark"] .fn { color: oklch(0.7 0.16 200); }

    .options { display: flex; gap: 16px; flex-wrap: wrap; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg-secondary); }
    .options label { font-size: 0.8rem; font-weight: 500; display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-secondary); }
    .options input[type="checkbox"] { accent-color: var(--brand); width: 16px; height: 16px; cursor: pointer; }
    .options select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.8rem; background: var(--bg); color: var(--text); }
  </style>

  <script>
    function showToast(msg) {
      var t = document.createElement('div');
      t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--radius-sm);font-size:0.85rem;font-weight:500;z-index:999;animation:fadeSlideUp 0.3s ease-out;max-width:90vw';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function() { t.remove(); }, 2500);
    }

    function copyToClipboard(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); showToast('Copied!'); } catch(e) { showToast('Failed to copy'); }
      document.body.removeChild(ta);
    }

    var KEYWORDS = ['SELECT','FROM','WHERE','AND','OR','NOT','IN','IS','NULL','AS','ON','LEFT','RIGHT','INNER','OUTER','JOIN','FULL','CROSS','GROUP','BY','ORDER','ASC','DESC','HAVING','LIMIT','OFFSET','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','DROP','ALTER','ADD','COLUMN','INDEX','VIEW','COUNT','SUM','AVG','MIN','MAX','DISTINCT','CASE','WHEN','THEN','ELSE','END','EXISTS','BETWEEN','LIKE','UNION','ALL','PRIMARY','KEY','FOREIGN','REFERENCES','CASCADE','DEFAULT','CHECK','UNIQUE','IF','REPLACE','MERGE','WITH','RECURSIVE','EXCEPT','INTERSECT','TRUE','FALSE'];
    var FUNCTIONS = ['COUNT','SUM','AVG','MIN','MAX','COALESCE','IFNULL','NULLIF','CAST','CONVERT','SUBSTR','SUBSTRING','LENGTH','TRIM','UPPER','LOWER','REPLACE','CONCAT','GROUP_CONCAT','DATE','DATETIME','STRFTIME','NOW','CURDATE','CURTIME','ROUND','FLOOR','CEIL','ABS','RANDOM','TYPEOF','INSTR'];

    function isKeyword(w) { return KEYWORDS.indexOf(w.toUpperCase()) > -1; }
    function isFunction(w) { return FUNCTIONS.indexOf(w.toUpperCase()) > -1; }

    function highlightSQL(sql) {
      var kwSet = {}; KEYWORDS.forEach(function(k) { kwSet[k] = true; });
      var fnSet = {}; FUNCTIONS.forEach(function(f) { fnSet[f] = true; });
      var escaped = sql.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var tokens = [];
      var i = 0;
      while (i < escaped.length) {
        if (escaped[i] === "'" || escaped[i] === '"') {
          var quote = escaped[i];
          var start = i;
          i++;
          while (i < escaped.length && escaped[i] !== quote) { if (escaped[i] === '\\') i++; i++; }
          if (i < escaped.length) i++;
          tokens.push({ type: 'str', text: escaped.substring(start, i) });
        } else if (escaped[i] === '-' && escaped[i+1] === '-') {
          var start = i;
          while (i < escaped.length && escaped[i] !== '\n') i++;
          tokens.push({ type: 'cm', text: escaped.substring(start, i) });
        } else if (/[a-zA-Z_]/.test(escaped[i])) {
          var start = i;
          while (i < escaped.length && /[a-zA-Z0-9_]/.test(escaped[i])) i++;
          var word = escaped.substring(start, i);
          if (kwSet[word.toUpperCase()]) tokens.push({ type: 'kw', text: word });
          else if (fnSet[word.toUpperCase()] && escaped[i] === '(') tokens.push({ type: 'fn', text: word });
          else tokens.push({ type: 'text', text: word });
        } else if (/[0-9]/.test(escaped[i])) {
          var start = i;
          while (i < escaped.length && /[0-9.]/.test(escaped[i])) i++;
          tokens.push({ type: 'num', text: escaped.substring(start, i) });
        } else {
          tokens.push({ type: 'text', text: escaped[i] });
          i++;
        }
      }
      return tokens.map(function(t) {
        if (t.type === 'text') return t.text;
        return '<span class="' + t.type + '">' + t.text + '</span>';
      }).join('');
    }

    function formatSQL(sql) {
      var uppercase = document.getElementById('uppercase').checked;
      var indentSize = parseInt(document.getElementById('indent-size').value);

      var lines = sql.split('\n');
      var cleaned = [];
      lines.forEach(function(l) {
        var trimmed = l.trim();
        if (trimmed) cleaned.push(trimmed);
      });
      var singleLine = cleaned.join(' ');

      var clauses = ['SELECT\\s+', 'INSERT\\s+(?:INTO\\s+)?', 'UPDATE\\s+', 'DELETE\\s+(?:FROM\\s+)?', 'CREATE\\s+(?:TABLE|VIEW|INDEX)\\s+', 'ALTER\\s+TABLE\\s+', 'DROP\\s+(?:TABLE|VIEW|INDEX)\\s+'];
      var subClauses = ['FROM\\s+', 'WHERE\\s+', 'GROUP\\s+BY\\s+', 'ORDER\\s+BY\\s+', 'HAVING\\s+', 'LIMIT\\s+', 'OFFSET\\s+', 'SET\\s+', 'VALUES\\s*\\('];
      var joinClauses = ['(?:LEFT|RIGHT|INNER|OUTER|FULL|CROSS)\\s+JOIN\\s+', 'JOIN\\s+', 'ON\\s+'];
      var all = clauses.concat(subClauses).concat(joinClauses);
      var pattern = '(' + all.join('|') + ')';
      var re = new RegExp(pattern, 'gi');

      var parts = [];
      var last = 0;
      var match;
      while ((match = re.exec(singleLine)) !== null) {
        if (match.index > last) parts.push({ text: singleLine.substring(last, match.index), isKeyword: false });
        parts.push({ text: match[0], isKeyword: true, keyword: match[0] });
        last = re.lastIndex;
      }
      if (last < singleLine.length) parts.push({ text: singleLine.substring(last), isKeyword: false });

      var result = [];
      var indent = 0;
      var inSelect = false;
      var inValues = false;

      parts.forEach(function(p) {
        if (!p.isKeyword) {
          var remaining = p.text.trim();
          if (remaining) {
            var items = remaining.split(',').map(function(s) { return s.trim(); });
            items.forEach(function(item, idx) {
              if (item) {
                if (idx > 0) result.push({ indent: indent + 1, text: item + (idx < items.length - 1 ? ',' : '') });
                else result.push({ indent: indent + 1, text: item + (idx < items.length - 1 ? ',' : '') });
              }
            });
          }
          return;
        }

        var kw = p.keyword.trim().toUpperCase();
        var original = p.keyword.trim();

        if (clauses.some(function(c) { return kw.match(new RegExp('^' + c.trim().toUpperCase().replace(/\\s\+/g,'\\s+'))); })) {
          indent = 0;
          inSelect = kw === 'SELECT';
          inValues = false;
          result.push({ indent: 0, text: (uppercase ? kw : original) });
        } else if (joinClauses.some(function(c) { return kw.match(new RegExp('^' + c.trim().toUpperCase().replace(/\\s\+/g,'\\s+'))); })) {
          result.push({ indent: 0, text: (uppercase ? kw : original) });
        } else if (kw === 'ON') {
          result.push({ indent: 1, text: (uppercase ? kw : original) });
        } else if (subClauses.some(function(c) { return kw.match(new RegExp('^' + c.trim().toUpperCase().replace(/\\s\+/g,'\\s+'))); })) {
          indent = 1;
          if (kw === 'VALUES(' || kw.startsWith('VALUES')) { inValues = true; indent = 1; }
          result.push({ indent: 0, text: (uppercase ? kw : original) });
        } else {
          result.push({ indent: indent, text: (uppercase ? kw : original) });
        }
      });

      var out = '';
      result.forEach(function(r) {
        var spaces = '';
        for (var i = 0; i < r.indent * indentSize; i++) spaces += ' ';
        if (out) out += '\n';
        out += spaces + r.text;
      });

      return out;
    }

    function formatAndDisplay() {
      var input = document.getElementById('sql-input').value;
      document.getElementById('input-count').textContent = input.length + ' chars';
      if (!input.trim()) { document.getElementById('sql-output').innerHTML = '<span class="cm">-- Enter SQL above and click Format</span>'; document.getElementById('line-numbers').textContent = '1'; document.getElementById('output-count').textContent = '0 chars'; return; }
      var formatted = formatSQL(input);
      var highlighted = highlightSQL(formatted);
      document.getElementById('sql-output').innerHTML = highlighted || '<span class="cm">-- No output</span>';
      var lines = (formatted || '').split('\n').length;
      var nums = '';
      for (var i = 1; i <= lines; i++) { nums += i + '\n'; }
      document.getElementById('line-numbers').textContent = nums;
      document.getElementById('output-count').textContent = formatted.length + ' chars';
    }

    document.getElementById('format-btn').addEventListener('click', formatAndDisplay);

    document.getElementById('copy-btn').addEventListener('click', function() {
      var text = document.getElementById('sql-output').textContent;
      if (!text || text === '-- Click Format to beautify' || text === '-- Enter SQL above and click Format' || text === '-- No output') { showToast('Nothing to copy'); return; }
      copyToClipboard(text);
    });

    document.getElementById('reset-btn').addEventListener('click', function() {
      document.getElementById('sql-input').value = 'SELECT u.id, u.name, u.email,\no.total\nFROM users u\nLEFT JOIN (\nSELECT user_id, SUM(amount) as total\nFROM orders\nWHERE status = \'completed\'\nGROUP BY user_id\n) o ON u.id = o.user_id\nWHERE u.active = 1\nAND o.total > 100\nORDER BY o.total DESC\nLIMIT 10';

      function s(t){document.documentElement.setAttribute('data-theme',t);i.innerHTML=t==='dark'?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>':'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';try{localStorage.setItem('theme',t)}catch(e){}}
      try{var l=localStorage.getItem('theme');if(l)s(l);else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)s('dark')}catch(e){}
      t.addEventListener('click',function(){s(g()==='dark'?'light':'dark')});
    })();
