<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | DevTools</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script data-goatcounter="https://dev-tools.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --brand-hue: 265; --brand: oklch(0.55 0.24 var(--brand-hue)); --brand-gradient: linear-gradient(135deg, oklch(0.55 0.24 265), oklch(0.5 0.26 300)); --bg: oklch(0.985 0.002 280); --text: oklch(0.15 0.02 280); --text-secondary: oklch(0.4 0.02 280); --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    [data-theme="dark"] { --bg: oklch(0.12 0.02 270); --text: oklch(0.95 0.01 280); --text-secondary: oklch(0.7 0.02 280); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 24px; }
    .code { font-size: 6rem; font-weight: 900; background: var(--brand-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 8px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p { color: var(--text-secondary); margin-bottom: 24px; max-width: 400px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 24px; background: var(--brand-gradient); color: #fff; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist or has been moved. Try the homepage for our developer tools.</p>
  <a href="index.html" class="btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Back to Home
  </a>
</body>
</html>
